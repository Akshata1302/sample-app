steps:
# Step 0: Compile the Go application
- name: 'gcr.io/cloud-builders/go'
  args: ['build', '-o', 'main', 'main.go']

# Step 1: Build the Docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'build',
      '-t',
      'us-central1-docker.pkg.dev/$PROJECT_ID/my-repository/hello-cloudbuild:$SHORT_SHA',
      '.'
    ]

# Step 2: Push the Docker image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'push',
      'us-central1-docker.pkg.dev/$PROJECT_ID/my-repository/hello-cloudbuild:$SHORT_SHA'
    ]

# Step 3: Deploy to GKE DEV namespace
- name: 'gcr.io/cloud-builders/kubectl'
  args:
    - apply
    - -f
    - dev/deployment.yaml
  env:
    - 'CLOUDSDK_COMPUTE_ZONE=us-central1-a'
    - 'CLOUDSDK_CONTAINER_CLUSTER=hello-cluster'

images:
- 'us-central1-docker.pkg.dev/$PROJECT_ID/my-repository/hello-cloudbuild:$SHORT_SHA'
