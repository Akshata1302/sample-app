steps:
  # Build the Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/my-repository/hello-cloudbuild-dev:v1.0",
        "."
      ]

  # Push the Docker image to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "push",
        "us-central1-docker.pkg.dev/$PROJECT_ID/my-repository/hello-cloudbuild-dev:v1.0"
      ]

  # Deploy the image to the GKE dev namespace
  - name: gcr.io/cloud-builders/kubectl
    args:
      [
        "apply",
        "-f",
        "dev/deployment.yaml",
        "-n",
        "dev"
      ]
    env:
      - "CLOUDSDK_COMPUTE_ZONE=us-central1-c"
      - "CLOUDSDK_CONTAINER_CLUSTER=hello-cluster"

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/my-repository/hello-cloudbuild-dev:v1.0"o

